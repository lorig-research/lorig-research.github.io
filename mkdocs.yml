site_name: Lo-Rig
site_description: Describing and promoting the endangered Mönpa and Gongduk languages of Bhutan.
site_url: https://lorig-research.github.io
repo_url: https://github.com/lorig-research/lorig-research.github.io
repo_name: lorig-research.github.io

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  logo: assets/logos/logo-lo-rig_white.png   # optional
  # favicon: assets/logos/favicon.png    # optional

plugins:
  - search
  # Optional but recommended for “proof of work” updates:
  - blog:
      archive: true
      authors: 
      authors_file: "{blog}/.authors.yml"
      blog_dir: updates
      blog_toc: true
      categories: true
      categories_name: Categories
      post_date_format: long
      post_url_date_format: yyyy/MM/dd
  - tags:
      enabled: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - About:
      - Overview: about/overview.md
      - Team: about/team.md
      - Partners & Funders: about/partners_funders.md
  - Research:
      - Languages: research/languages.md
      - Methods & Data: research/methods_data.md
      - Outputs: research/outputs.md
  - Community:
      - Overview: community/overview.md
      - Monpa community: community/monpa_community.md
      - Gongduk community: community/gongduk_community.md
      - Engagement: community/engagement.md
  - Outputs:
      - Awards & Grants: outputs/awards_grants.md
      - Publications: outputs/publications.md
      - Talks & Posters: outputs/talks_posters.md
  - Project Updates:
      - Blog: updates/index.md
  - Resources:
      - Data & Materials: resources/data_materials.md
      - Downloads: resources/downloads.md
      - Contact: resources/contact.md

extra_css:
  - stylesheets/extra.css
